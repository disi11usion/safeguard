version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg17
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-init:
    build:
      context: ./backend/database
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ./backend/database:/app
    command: ["python", "scripts/run_create.py"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      #for python debug
      - "5678:5678"
    env_file:
      - .env
    environment:
      - MARKET_SHAKE_CSV_DIR=/app/data/csv
    volumes:
      - ./backend:/app
      - ./data:/app/data:ro

  backend-debbug:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      #for python debug
      - "5678:5678"
    env_file:
      - .env
    environment:
      - MARKET_SHAKE_CSV_DIR=/app/data/csv
    volumes:
      - ./backend:/app
      - ./data:/app/data:ro
    command: >
      python -m debugpy
      --listen 0.0.0.0:5678
      --wait-for-client
      -m uvicorn application.main:app
      --host 0.0.0.0
      --port 8000



  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_API_BASE=http://localhost:8000
      - VITE_STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - VITE_PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID}
    depends_on:
      - backend
    command: ["/bin/sh", "-lc", "if [ ! -x node_modules/.bin/vite ]; then npm install; fi; npm run dev -- --host 0.0.0.0"]

  frontend-debug:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_API_BASE=http://localhost:8000
      - VITE_STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - VITE_PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID}
    command: ["/bin/sh", "-lc", "if [ ! -x node_modules/.bin/vite ]; then npm install; fi; npm run dev -- --host 0.0.0.0"]
    
  data:
    build:
      context: .
      dockerfile: ./data/Dockerfile
    volumes:
      - ./data:/app/data
      - ./ai:/app/ai
    env_file:
      - .env
    depends_on:
      - db
      - db-init
    restart: unless-stopped
    command: ["bash", "./data/wait-for-db-init.sh"]

  ollama:
    build:
      context: .
      dockerfile: ai/Dockerfile.ollama.complete
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 300s
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*

volumes:
  pgdata:
  ollama_data:
